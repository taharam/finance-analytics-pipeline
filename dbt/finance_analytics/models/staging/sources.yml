version: 2

sources:
  - name: default
    schema: default
    tables:
      - name: transformed_stock_prices
        description: "PySpark transformed stock prices from Yahoo Finance"
        columns:
          - name: date
            tests:
              - not_null
          - name: ticker
            tests:
              - not_null
          - name: close
            tests:
              - not_null

models:
  - name: stg_stock_prices
    description: "Staged stock prices — cleaned and renamed from raw source"
    columns:
      - name: date
        tests:
          - not_null
      - name: ticker
        tests:
          - not_null
          - accepted_values:
              values: ["AAPL", "MSFT", "GOOGL", "AMZN", "META",
                       "NVDA", "JPM", "V", "JNJ", "XOM"]